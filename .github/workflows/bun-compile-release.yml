name: Bun Compile Release

on:
  workflow_dispatch:
    inputs:
      skip-smoke:
        description: Skip smoke tests after build
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: bun-compile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: darwin
            arch: arm64
            runner: macos-latest
            target: bun-darwin-arm64
            artifact: openclaw-darwin-arm64
            binary: openclaw
          - os: darwin
            arch: x64
            runner: macos-latest
            target: bun-darwin-x64
            artifact: openclaw-darwin-x64
            binary: openclaw
            skip-smoke: true

          # Linux
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: bun-linux-x64
            artifact: openclaw-linux-x64
            binary: openclaw
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            target: bun-linux-arm64
            artifact: openclaw-linux-arm64
            binary: openclaw
            cross: true

          # Windows
          - os: win32
            arch: x64
            runner: windows-latest
            target: bun-windows-x64
            artifact: openclaw-windows-x64
            binary: openclaw.exe
          - os: win32
            arch: arm64
            runner: [self-hosted, windows-arm64]
            target: bun-windows-arm64
            artifact: openclaw-windows-arm64
            binary: openclaw.exe

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # --- Node + pnpm ---
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.23.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Runtime versions
        run: |
          node -v
          pnpm -v
          bun -v

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts=false --config.engine-strict=false --config.enable-pre-post-scripts=true
          # For cross-compile jobs, also fetch target-arch optional native deps
          if [ "${{ matrix.cross }}" = "true" ] || [ "${{ matrix.skip-smoke }}" = "true" ]; then
            pnpm install --frozen-lockfile --config.engine-strict=false \
              --config.supportedArchitectures.cpu='["current","${{ matrix.arch }}"]' \
              --config.supportedArchitectures.os='["current","${{ matrix.os }}"]'
          fi

      # --- Pre-build assets ---
      - name: Build Control UI
        run: pnpm ui:build

      # --- Bun compile ---
      - name: Build binary (${{ matrix.os }}-${{ matrix.arch }})
        run: |
          ARGS=(--target "${{ matrix.target }}" --outdir "dist-bun")
          if [ "${{ matrix.cross }}" = "true" ]; then
            ARGS+=(--skip-native)
          fi
          bun scripts/build-bun-compile.ts "${ARGS[@]}"

      # --- macOS: import certificate, codesign, notarize ---
      - name: Import signing certificate (macOS)
        if: matrix.os == 'darwin' && env.MACOS_CERTIFICATE_BASE64 != ''
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert-${{ matrix.arch }}-XXXXXX.p12)
          KEYCHAIN_FILE=$(mktemp -u /tmp/keychain-${{ matrix.arch }}-XXXXXX.keychain-db)
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"
          rm -f "$CERT_FILE"

      - name: Codesign binary (macOS)
        if: matrix.os == 'darwin'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY || '-' }}
        run: |
          codesign --force --options runtime \
            --entitlements scripts/entitlements.plist \
            --sign "$SIGN_IDENTITY" \
            dist-bun/${{ matrix.binary }}
          codesign --verify --verbose dist-bun/${{ matrix.binary }}

      - name: Notarize binary (macOS)
        if: matrix.os == 'darwin' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # notarytool requires a zip/dmg/pkg — zip the binary for submission
          NOTARY_ZIP=$(mktemp /tmp/notarize.XXXXXX.zip)
          ditto -c -k --keepParent dist-bun/${{ matrix.binary }} "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          rm -f "$NOTARY_ZIP"

      - name: Cleanup keychain (macOS)
        if: matrix.os == 'darwin' && always()
        run: |
          if [ -n "${KEYCHAIN_FILE:-}" ] && [ -f "${KEYCHAIN_FILE:-}" ]; then
            security delete-keychain "$KEYCHAIN_FILE" || true
          fi

      # --- Smoke test (native builds only) ---
      - name: Smoke test
        if: matrix.cross != true && matrix.skip-smoke != true && inputs.skip-smoke != true
        run: |
          ./dist-bun/${{ matrix.binary }} --version
        timeout-minutes: 1

      # --- Package ---
      - name: Package (tar.gz)
        if: matrix.os != 'win32'
        run: |
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist-bun .

      - name: Package (zip, Windows)
        if: matrix.os == 'win32'
        shell: pwsh
        run: |
          Compress-Archive -Path dist-bun\* -DestinationPath ${{ matrix.artifact }}.zip

      # --- Upload ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          retention-days: 7

  # --- Create GitHub Release on tag push ---
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
